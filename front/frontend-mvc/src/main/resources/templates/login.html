<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/styles.css}">
</head>

<body>

<div id="view-login">

    <div class="login-card">

        <div class="brand">
            <span class="brand-name">
                Sistema Servicio Social
            </span>
        </div>

        <h1>Bienvenido</h1>

        <p class="subtitle">
            Inicia sesión para continuar
        </p>

        <p th:if="${param.error}"
           class="error-msg"
           style="color:red; margin-bottom:15px;">

            Usuario o contraseña incorrectos

        </p>

        <form action="/login"
              method="post">

            <div class="field">

                <label>
                    Correo electrónico
                </label>

                <input type="email"
                       name="correoElectronico"
                       placeholder="usuario@correo.com"
                       required>

            </div>

            <div class="field">

                <label>
                    Contraseña
                </label>

                <input type="password"
                       name="contrasena"
                       placeholder="••••••••"
                       required>

            </div>

            <button type="submit"
                    class="btn-primary">

                Entrar

            </button>

        </form>

    </div>

</div>

</body>
</html>
