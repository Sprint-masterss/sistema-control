<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- LOGIN -->
  <div id="view-login">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon"></div>
        <span class="brand-name">Login Version 1</span>
      </div>
      <h1>Bienvenido</h1>
      <p class="subtitle">Inicia sesión para continuar</p>

      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="inp-email" placeholder="usuario@correo.com" />
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="inp-pass" placeholder="••••••••" />
      </div>

      <p id="login-error" class="error-msg"></p>
      <button id="btn-login" class="btn-primary">Entrar</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="view-dashboard" class="hidden">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">DashBoardPrincipal Beta</div>
        
        <nav>
          <p class="nav-label">Menú</p>
          <a href="#" class="nav-item active">Inicio</a>
          <a href="#" class="nav-item">Usuarios</a>
          <a href="#" class="nav-item">Reportes</a>
          
          <p class="nav-label">Ajustes</p>
          <a href="#" class="nav-item">Configuración</a>
          <a href="#" id="btn-logout" class="nav-item logout">Cerrar Sesión</a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <h2 id="greeting">Hola, Usuario</h2>
          <div class="user-pill">Admin</div>
        </header>

        <div class="content">
          <!-- Espacio para Datos -->
          <div class="metrics-grid">
            <div class="card">Métrica 1</div>
            <div class="card">Métrica 2</div>
            <div class="card">Métrica 3</div>
          </div>

          <!-- Contenido principal -->
          <div class="panel">
            <div class="panel-header">Contenido Principal</div>
            <div class="empty-state">No hay datos para mostrar todavía.</div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
