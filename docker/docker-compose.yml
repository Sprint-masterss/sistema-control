services:

  mysql:
    image: mysql
    restart: always
    container_name: mysql_sistema

    environment:
      MYSQL_ROOT_PASSWORD: Root.123.4
      MYSQL_DATABASE: servicio_social_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  backend-api:
    build: ../back/backend-api
    container_name: backend-api

    ports:
      - "8080:8080"

    depends_on:
      - mysql

  frontend-mvc:
    build: ../front/frontend-mvc
    container_name: frontend-mvc

    ports:
      - "8081:8081"

    depends_on:
      - backend-api

volumes:
  mysql_data: